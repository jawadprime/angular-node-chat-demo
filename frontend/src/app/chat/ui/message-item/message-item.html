<div class="row" [class.own]="message().isOwnMessage">
  @if (!message().isOwnMessage) {
    <app-avatar [name]="message().senderDisplayName" />
  }

  <div class="bubble">
    <p class="content">{{ message().content }}</p>
    <span class="meta">
      {{ message().createdOn | date: 'shortTime' }}
      @if (message().isOwnMessage && isRead()) {
        <span class="seen">· Seen</span>
      }
    </span>
  </div>
</div>
